apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mi-db-hpa
  namespace: docker-testing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mi-db
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
