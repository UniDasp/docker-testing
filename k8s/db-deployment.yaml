apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-db
  namespace: docker-testing
  labels:
    app: mi-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-db
  template:
    metadata:
      labels:
        app: mi-db
    spec:
      containers:
        - name: mi-db
          image: ${ECR_DB_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: db-storage
              mountPath: /app
      volumes:
        - name: db-storage
          emptyDir: {}
